# Development profile: run the whole app with zero external setup.
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Uses an in-memory H2 database that is recreated on each start.

spring.datasource.url=jdbc:h2:mem:bankdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dev uses Hibernate's generated schema on plain H2 for a zero-setup start; Flyway
# (MySQL-flavoured) stays off here and governs the real MySQL schema in production.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
