# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Override the MySQL dialect inherited from application.properties; otherwise Hibernate
# generates MySQL DDL that H2 silently rejects, leaving the schema empty.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway is disabled here: the unit/integration suite runs on Hibernate's generated
# H2 schema. The migration SQL itself is verified separately by FlywayMigrationTest.
spring.flyway.enabled=false

# Hibernate Configuration.
# 'create' (not 'create-drop') so a closing Spring context never drops the shared
# in-memory schema out from under another still-cached context.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Open EntityManager in View to improve performance
spring.jpa.open-in-view=false

# Security configuration for tests
app.jwt.secret=test-only-secret-change-me-please-0123456789-abcdef
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:8080

# Effectively disable auth rate limiting for the shared integration-test context (all test
# classes reuse one cached context, so its singleton bucket would otherwise accumulate every
# login/register across the suite). RateLimitingFilterTest sets its own low cap in isolation.
app.ratelimit.auth.capacity=1000000
app.ratelimit.auth.refill-seconds=1
